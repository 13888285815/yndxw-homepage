<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 未来平台</title>
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 2rem;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #4A90E2;
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            background: #4A90E2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #357ABD;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }

        .info-message {
            background: #d1ecf1;
            color: #0c5460;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
            text-align: center;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 1rem;
            display: none;
        }

        .link-text {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
        }

        .link-text a {
            color: #4A90E2;
            text-decoration: none;
            font-weight: 500;
        }

        .link-text a:hover {
            text-decoration: underline;
        }

        /* TOTP 验证码输入 */
        .totp-section {
            display: none;
        }

        .totp-section.active {
            display: block;
        }

        .totp-input-wrapper {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .totp-digit {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: border-color 0.2s;
        }

        .totp-digit:focus {
            outline: none;
            border-color: #4A90E2;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }

        .totp-hint {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        .back-to-login {
            background: none;
            border: none;
            color: #4A90E2;
            cursor: pointer;
            font-size: 0.9rem;
            display: block;
            margin: 0 auto;
            padding: 0.5rem;
        }

        .back-to-login:hover {
            text-decoration: underline;
        }

        /* 步骤指示器 */
        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .step {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .step.active {
            background: #4A90E2;
            color: white;
        }

        .step.done {
            background: #28a745;
            color: white;
        }

        .step-line {
            width: 40px;
            height: 2px;
            background: #e0e0e0;
        }

        .step-line.active {
            background: #4A90E2;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>登录</h1>

        <!-- 步骤指示器 -->
        <div class="step-indicator">
            <div class="step active" id="step1">1</div>
            <div class="step-line" id="step-line"></div>
            <div class="step" id="step2">2</div>
        </div>

        <div class="error-message" id="error-message"></div>
        <div class="info-message" id="info-message"></div>

        <!-- 步骤1: 用户名+密码 -->
        <form id="login-form">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn" id="login-btn">登录</button>
        </form>

        <!-- 步骤2: TOTP 验证码 -->
        <div class="totp-section" id="totp-section">
            <div class="totp-hint">请输入 Authenticator 应用中的 6 位验证码</div>
            <div class="totp-input-wrapper" id="totp-inputs">
                <input type="text" maxlength="1" class="totp-digit" data-index="0" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="totp-digit" data-index="1" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="totp-digit" data-index="2" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="totp-digit" data-index="3" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="totp-digit" data-index="4" inputmode="numeric" pattern="[0-9]">
                <input type="text" maxlength="1" class="totp-digit" data-index="5" inputmode="numeric" pattern="[0-9]">
            </div>
            <button type="button" class="btn" id="verify-totp-btn">验证并登录</button>
            <button type="button" class="back-to-login" id="back-btn">← 返回密码登录</button>
        </div>

        <div class="link-text">
            还没有账号？<a href="register.html">立即注册</a>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const infoMessage = document.getElementById('info-message');
        const loginBtn = document.getElementById('login-btn');
        const totpSection = document.getElementById('totp-section');
        const verifyTotpBtn = document.getElementById('verify-totp-btn');
        const backBtn = document.getElementById('back-btn');
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const stepLine = document.getElementById('step-line');

        let pendingUsername = '';

        // 显示/隐藏消息
        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.style.display = 'block';
            infoMessage.style.display = 'none';
        }

        function showInfo(msg) {
            infoMessage.textContent = msg;
            infoMessage.style.display = 'block';
            errorMessage.style.display = 'none';
        }

        function hideMessages() {
            errorMessage.style.display = 'none';
            infoMessage.style.display = 'none';
        }

        // 切换到 TOTP 步骤
        function showTotpStep(username) {
            pendingUsername = username;
            loginForm.style.display = 'none';
            totpSection.classList.add('active');
            step1.classList.remove('active');
            step1.classList.add('done');
            step1.textContent = '✓';
            step2.classList.add('active');
            stepLine.classList.add('active');
            hideMessages();
            // 自动聚焦第一个输入框
            setTimeout(() => document.querySelector('.totp-digit').focus(), 100);
        }

        // 返回密码步骤
        function backToPasswordStep() {
            loginForm.style.display = 'block';
            totpSection.classList.remove('active');
            step1.classList.remove('done');
            step1.classList.add('active');
            step1.textContent = '1';
            step2.classList.remove('active');
            stepLine.classList.remove('active');
            hideMessages();
            // 清空 TOTP 输入
            document.querySelectorAll('.totp-digit').forEach(d => d.value = '');
            document.getElementById('password').value = '';
        }

        // TOTP 输入框自动跳转
        document.querySelectorAll('.totp-digit').forEach((input, idx) => {
            input.addEventListener('input', (e) => {
                const val = e.target.value.replace(/[^0-9]/g, '');
                e.target.value = val;
                if (val && idx < 5) {
                    document.querySelectorAll('.totp-digit')[idx + 1].focus();
                }
                // 6位输满自动提交
                if (idx === 5 && val) {
                    const code = Array.from(document.querySelectorAll('.totp-digit')).map(d => d.value).join('');
                    if (code.length === 6) {
                        verifyTotpBtn.click();
                    }
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && idx > 0) {
                    document.querySelectorAll('.totp-digit')[idx - 1].focus();
                }
            });

            // 支持粘贴完整验证码
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
                if (paste.length === 6) {
                    document.querySelectorAll('.totp-digit').forEach((d, i) => d.value = paste[i]);
                    document.querySelectorAll('.totp-digit')[5].focus();
                    setTimeout(() => verifyTotpBtn.click(), 200);
                }
            });
        });

        // 步骤1: 提交密码
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            hideMessages();
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';

            try {
                const response = await fetch(`${PLATFORM_CONFIG.API_BASE}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.requires_2fa) {
                    // 需要 TOTP 验证
                    showTotpStep(username);
                } else if (response.ok && data.token) {
                    // 直接登录成功
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', username);
                    window.location.href = 'index.html';
                } else {
                    showError(data.error || '登录失败，请检查用户名和密码');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                console.error('Login error:', error);
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });

        // 步骤2: 验证 TOTP
        verifyTotpBtn.addEventListener('click', async () => {
            const code = Array.from(document.querySelectorAll('.totp-digit')).map(d => d.value).join('');
            if (code.length !== 6) {
                showError('请输入完整的 6 位验证码');
                return;
            }

            hideMessages();
            verifyTotpBtn.disabled = true;
            verifyTotpBtn.textContent = '验证中...';

            try {
                const response = await fetch(`${PLATFORM_CONFIG.API_BASE}/api/v1/auth/verify-2fa`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: pendingUsername, code })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', pendingUsername);
                    window.location.href = 'index.html';
                } else {
                    showError(data.error || '验证码错误，请重试');
                    document.querySelectorAll('.totp-digit').forEach(d => d.value = '');
                    document.querySelector('.totp-digit').focus();
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                console.error('2FA error:', error);
            } finally {
                verifyTotpBtn.disabled = false;
                verifyTotpBtn.textContent = '验证并登录';
            }
        });

        backBtn.addEventListener('click', backToPasswordStep);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <meta name="theme-color" content="#87CEEB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>YNDXW - 全球内容互联平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading -->
    <div id="loading">
        <h2>YNDXW</h2>
        <div class="bar"><div class="bar-inner" id="loadBar"></div></div>
    </div>

    <!-- 3D场景 -->
    <canvas id="scene"></canvas>

    <!-- UI覆盖层 -->
    <div id="ui">
        <header>
            <div class="logo">☁️ YNDXW</div>
            <nav>
                <button class="ui-btn primary" id="btn-enter">开始探索</button>
                <button class="ui-btn ghost" id="btn-login">登录</button>
            </nav>
        </header>
        <div class="hint">👁️ 第一人称视角 · 拖拽转头 · 点击建筑进入</div>
    </div>

    <!-- 登录弹窗 -->
    <div id="login-modal">
        <div class="login-box">
            <h2>登录 YNDXW</h2>
            <p>进入你的未来世界</p>
            <input class="login-input" type="text" placeholder="用户名 / 邮箱">
            <input class="login-input" type="password" placeholder="密码">
            <button class="login-btn">登 录</button>
        </div>
    </div>

    <!-- 2D降级内容（默认隐藏，不支持WebGL时显示）-->
    <div id="fallback-2d" style="display:none;min-height:100vh;background:#0a1628;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:40px 20px;text-align:center">
        <div style="font-size:2.5em;margin-bottom:10px">☁️ YNDXW</div>
        <div style="font-size:1em;color:#7ec8e3;margin-bottom:30px">全球内容互联平台</div>
        <div style="max-width:400px;margin:0 auto;display:grid;gap:16px">
            <div style="background:#1a2a4a;border-radius:12px;padding:20px"><div style="font-size:2em">🏛️</div><div style="font-weight:600;margin-top:8px">核心楼阁</div><div style="color:#7ec8e3;font-size:.85em;margin-top:4px">平台核心区域</div></div>
            <div style="background:#1a2a4a;border-radius:12px;padding:20px"><div style="font-size:2em">🏪</div><div style="font-weight:600;margin-top:8px">市场大厅</div><div style="color:#7ec8e3;font-size:.85em;margin-top:4px">Agent/Skill交易市场</div></div>
            <div style="background:#1a2a4a;border-radius:12px;padding:20px"><div style="font-size:2em">🏛️</div><div style="font-weight:600;margin-top:8px">博物馆</div><div style="color:#7ec8e3;font-size:.85em;margin-top:4px">知识沉淀与展示</div></div>
            <div style="background:#1a2a4a;border-radius:12px;padding:20px"><div style="font-size:2em">🎓</div><div style="font-weight:600;margin-top:8px">未来学校</div><div style="color:#7ec8e3;font-size:.85em;margin-top:4px">AI驱动个性化学习</div></div>
        </div>
        <div style="margin-top:30px;color:#4a6a8a;font-size:.8em">YNDXW · 您的设备不支持3D，已切换至简化版</div>
    </div>

    <!-- WebGL检测 + 降级逻辑 -->
    <script>
    (function(){
      var cv = document.createElement('canvas');
      var gl = cv.getContext('webgl') || cv.getContext('experimental-webgl');
      if(!gl) {
        // 不支持WebGL → 切2D
        document.getElementById('scene').style.display = 'none';
        document.getElementById('loading').style.display = 'none';
        document.getElementById('ui').style.display = 'none';
        document.getElementById('fallback-2d').style.display = 'block';
        document.title = 'YNDXW - 全球内容互联平台';
        return;
      }
      window.__webglOK = true;
      
      // WebGL 5秒超时：如果3D没起来就切2D
      var fallbackTimer = setTimeout(function(){
        if(!window.__3DRendered && window.__webglOK) {
          document.getElementById('scene').style.display = 'none';
          document.getElementById('loading').style.display = 'none';
          document.getElementById('ui').style.display = 'none';
          document.getElementById('fallback-2d').style.display = 'block';
        }
      }, 8000);
      window.__fallbackTimer = fallbackTimer;
    })();
    </script>
    <!-- 脚本：先加载Three.js（CDN），再加载config.js，最后加载app.js -->
    <script src="js/lib/three.min.js"></script>
    <script src="js/config.js"></script>
    <script>
        // 加载进度动画
        let progress=0;
        const bar=document.getElementById('loadBar');
        const loading=document.getElementById('loading');
        const timer=setInterval(()=>{
            progress+=Math.random()*15;
            if(progress>=100){
                progress=100;
                clearInterval(timer);
                setTimeout(function(){loading.classList.add('hide')},400);
            }
            bar.style.width=progress+'%';
        },80);
        
        // 按钮事件
        document.getElementById('btn-enter').addEventListener('click', ()=>{
            document.querySelector('.hint').style.opacity='1';
        });
        document.getElementById('btn-login').addEventListener('click', ()=>{
            document.getElementById('login-modal').classList.toggle('show');
        });
        document.getElementById('login-modal').addEventListener('click', e=>{
            if(e.target===e.currentTarget) e.target.classList.remove('show');
        });
    </script>
    <script src="js/app.js"></script>
</body>
</html>

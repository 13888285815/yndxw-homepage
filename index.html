<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五区之门 - 未来平台</title>
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Three.js r160 本地文件 -->
  <script src="js/lib/three.min.js"></script>
  
  <!-- 注意：暂时不使用OrbitControls，使用自定义第一人称控制器 -->
</head>
<body>
  <!-- 加载进度条 -->
  <div id="loading-screen">
    <div id="loading-bar">
      <div id="loading-progress"></div>
    </div>
    <div id="loading-text">正在加载五区之门...</div>
  </div>

  <!-- 3D场景容器 -->
  <div id="container"></div>

  <!-- UI叠加层 -->
  <div id="ui-overlay">
    <!-- 区域名称提示 -->
    <div id="zone-prompt" class="hidden">
      <p id="zone-name"></p>
      <p id="zone-hint">点击进入</p>
    </div>

    <!-- 返回按钮 -->
    <button id="back-button" class="hidden">返回五区之门</button>

    <!-- FPS显示 -->
    <div id="fps-counter" class="hidden">FPS: 0</div>
  </div>

  <!-- 主应用脚本 -->
  <script src="js/sceneManager.js"></script>
  <script src="js/firstPersonController.js"></script>
  <script src="js/doorInteraction.js"></script>
  <script src="js/app-3d.js"></script>
</body>
</html>

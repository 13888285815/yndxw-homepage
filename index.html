<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YNDXW - 全球内容互联平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a1628;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hero{text-align:center;padding:40px 20px}
.logo{font-size:3em;margin-bottom:10px}
.tagline{font-size:1.2em;color:#7ec8e3;margin-bottom:30px}
.cards{display:grid;grid-template-columns:1fr;gap:16px;max-width:400px;width:90%;margin:0 auto}
.card{background:#1a2a4a;border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:transform .2s,background .2s}
.card:hover{transform:scale(1.05);background:#2a3a5a}
.card .icon{font-size:2em;margin-bottom:8px}
.card .name{font-size:1em;font-weight:600}
.card .desc{font-size:.85em;color:#7ec8e3;margin-top:4px}
footer{margin-top:30px;color:#4a6a8a;font-size:.8em}
</style>
</head>
<body>
<div class="hero">
<div class="logo">☁️ YNDXW</div>
<div class="tagline">全球内容互联平台 · 第一人称3D虚拟世界</div>
</div>
<div class="cards">
<div class="card">
<div class="icon">🏛️</div>
<div class="name">核心楼阁</div>
<div class="desc">平台核心区域，导航中心</div>
</div>
<div class="card">
<div class="icon">🏪</div>
<div class="name">市场大厅</div>
<div class="desc">Agent/Skill交易市场</div>
</div>
<div class="card">
<div class="icon">🏛️</div>
<div class="name">博物馆</div>
<div class="desc">知识沉淀与展示中心</div>
</div>
<div class="card">
<div class="icon">🎓</div>
<div class="name">未来学校</div>
<div class="desc">AI驱动的个性化学习</div>
</div>
</div>
<footer>YNDXW v1.0 · 3D版加载中请稍候</footer>
</body>
</html>

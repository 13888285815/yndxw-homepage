<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>五区之门 - 未来平台</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- 预加载提示（不阻塞，仅提示浏览器提前建立连接） -->
  <link rel="dns-prefetch" href="//fonts.googleapis.com">
  <link rel="preconnect" href="https://13888285815.github.io">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <!-- 骨架屏CSS（首屏立即渲染，零JS依赖） -->
  <style>
    body { margin: 0; overflow: hidden; background: #0a0a1a; }
    #loading-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d0d2a 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.5s;
    }
    #loading-screen.fade-out { opacity: 0; pointer-events: none; }
    .skeleton-title {
      width: 240px; height: 40px; background: rgba(255,255,255,0.06);
      border-radius: 8px; margin-bottom: 32px;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-bar {
      width: 320px; height: 4px; background: rgba(255,255,255,0.04);
      border-radius: 2px; overflow: hidden;
    }
    #loading-progress {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, transparent, rgba(100,180,255,0.6), transparent);
      border-radius: 2px; transition: width 0.3s;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0%,100% { background: rgba(255,255,255,0.06); }
      50% { background: rgba(255,255,255,0.12); }
    }
    .loading-tip {
      margin-top: 20px; color: rgba(255,255,255,0.35);
      font-size: 13px; font-family: system-ui, sans-serif;
      letter-spacing: 0.5px;
    }

    /* 2D后备界面样式（WebGL不支持时显示） */
    #fallback-2d {
      position: fixed; inset: 0; z-index: 10000;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d0d2a 100%);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      color: white; font-family: system-ui, sans-serif;
    }
    #fallback-2d.show { display: flex; }
    .fallback-title {
      font-size: 32px; font-weight: 700; margin-bottom: 16px;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .fallback-subtitle {
      font-size: 16px; color: rgba(255,255,255,0.6); margin-bottom: 48px;
    }
    .fallback-zones {
      display: grid; grid-template-columns: repeat(5, 1fr); gap: 24px;
      max-width: 900px; width: 100%; padding: 0 24px;
    }
    .fallback-zone-card {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 24px; text-align: center;
      cursor: pointer; transition: all 0.3s; backdrop-filter: blur(10px);
    }
    .fallback-zone-card:hover {
      background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.24);
      transform: translateY(-4px);
    }
    .fallback-zone-icon {
      font-size: 48px; margin-bottom: 12px; display: block;
    }
    .fallback-zone-name {
      font-size: 18px; font-weight: 600; margin-bottom: 8px;
    }
    .fallback-zone-desc {
      font-size: 13px; color: rgba(255,255,255,0.5); line-height: 1.5;
    }
    .fallback-tip {
      margin-top: 48px; font-size: 13px; color: rgba(255,255,255,0.35);
      padding: 12px 24px; background: rgba(255,255,255,0.04);
      border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
    }
    #museum-btn {
      position: fixed; bottom: 20px; right: 20px; z-index: 999;
      padding: 10px 20px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      color: #fff; font-size: 15px; cursor: pointer;
      transition: all 0.2s; display: none;
    }
    #museum-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
    #museum-btn.visible { display: block; }
  </style>
</head>
<body>
  <!-- 骨架屏（纯CSS，HTML解析完立即显示） -->
  <div id="loading-screen">
    <div class="skeleton-title"></div>
    <div class="skeleton-bar">
      <div id="loading-progress"></div>
    </div>
    <div class="loading-tip">正在加载 3D 场景...</div>
  </div>

  <!-- 2D后备界面（WebGL不支持时显示，支持三层导航） -->
  <div id="fallback-2d">
    <div id="fallback-main">
      <div class="fallback-title">五区之门</div>
      <div class="fallback-subtitle">2D兼容模式 · 支持三层导航</div>
      <div class="fallback-zones">
        <div class="fallback-zone-card" onclick="window._fbShowZone('adult')">
          <span class="fallback-zone-icon">🏢</span>
          <div class="fallback-zone-name">成人区</div>
          <div class="fallback-zone-desc">商业区，付费服务、专业工具、企业级应用</div>
        </div>
        <div class="fallback-zone-card" onclick="window._fbShowZone('teen')">
          <span class="fallback-zone-icon">🎓</span>
          <div class="fallback-zone-name">青少年区</div>
          <div class="fallback-zone-desc">学习区，编程教育、学科辅导、兴趣培养</div>
        </div>
        <div class="fallback-zone-card" onclick="window._fbShowZone('children')">
          <span class="fallback-zone-icon">🧸</span>
          <div class="fallback-zone-name">儿童区</div>
          <div class="fallback-zone-desc">教育区，互动故事、益智游戏、安全教育</div>
        </div>
        <div class="fallback-zone-card" onclick="window._fbShowZone('elderly')">
          <span class="fallback-zone-icon">🏯</span>
          <div class="fallback-zone-name">老年区</div>
          <div class="fallback-zone-desc">公益区，大字版、语音助手、健康监测</div>
        </div>
        <div class="fallback-zone-card" onclick="window._fbShowZone('accessible')">
          <span class="fallback-zone-icon">♿</span>
          <div class="fallback-zone-name">残障友好区</div>
          <div class="fallback-zone-desc">无障碍区，高对比度、大字体、屏幕阅读器支持</div>
        </div>
      </div>
      <div class="fallback-tip">💡 提示：使用 Chrome/Firefox/Edge 最新版本可获得最佳3D体验</div>
    </div>
    <div id="fallback-zone-page" style="display:none"></div>
  </div>

  <div id="container"></div>

  <div id="ui-overlay">
    <div id="zone-prompt" class="hidden">
      <p id="zone-name"></p>
      <p id="zone-hint">点击进入</p>
    </div>
    <button id="back-button" class="hidden">返回五区之门</button>
    <div id="fps-counter" class="hidden">FPS: 0</div>
    <button id="museum-btn" class="hidden">🏛️ 博物馆</button>
  </div>

  <!--
    加载策略：
    1. HTML+CSS骨架屏：DOMContentLoaded < 200ms（纯静态，无JS依赖）
    2. Three.js：window.load 后 requestIdleCallback 触发（不在首屏关键路径）
    3. 业务模块：与Three.js同批次并行加载
    4. preconnect：提前预解析外部域名
    5. WebGL降级：不支持时显示2D后备界面
  -->
  <script>
  (function() {
    // 工具函数：动态加载JS
    function loadJS(src) {
      return new Promise(function(resolve, reject) {
        var s = document.createElement('script');
        s.src = src; s.onload = resolve; s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    // 按序加载
    function loadSeq(arr) {
      return arr.reduce(function(chain, src) {
        return chain.then(function() { return loadJS(src); });
      }, Promise.resolve());
    }

    // 进度条
    function setProgress(pct, text) {
      var bar = document.getElementById('loading-progress');
      var tip = document.querySelector('.loading-tip');
      if (bar) bar.style.width = pct + '%';
      if (tip && text) tip.textContent = text;
    }

    // 骨架屏控制
    function hideLoading() {
      var ls = document.getElementById('loading-screen');
      if (ls) {
        ls.classList.add('fade-out');
        setTimeout(function() { if (ls.parentNode) ls.parentNode.removeChild(ls); }, 600);
      }
    }
    window.__removeLoadingScreen = hideLoading;

    // 显示2D后备界面
    window.__show2DFallback = function() {
      hideLoading();
      var fallback = document.getElementById('fallback-2d');
      if (fallback) fallback.classList.add('show');
    };

    // 加载2D后备界面
    function load2DFallback() {
      setProgress(100, '加载2D兼容模式...');
      setTimeout(function() {
        window.__show2DFallback();
      }, 500);
    }

    // 启动
    window.addEventListener('DOMContentLoaded', function() {
      setProgress(5, '检测环境...');

      // 轻量WebGL检测（无需Three.js）
      var webglSupported = false;
      try {
        var c = document.createElement('canvas');
        var gl = c.getContext('webgl2') || c.getContext('webgl');
        if (gl) { webglSupported = true; }
      } catch(e) { webglSupported = false; }

      if (!webglSupported) {
        setProgress(100, '检测到兼容模式，正在加载2D界面...');
        // WebGL不支持，加载2D后备界面
        load2DFallback();
        return;
      }

      setProgress(10, '加载3D引擎...');

      // 第一步：Three.js 改为 window.load 后触发（让首屏骨架屏先渲染）
      window.addEventListener('load', function onLoad() {
        window.removeEventListener('load', onLoad);
        var doIdle = window.requestIdleCallback || function(cb) { setTimeout(cb, 0); };
        doIdle(function() {
          loadJS('js/lib/three.min.js').then(function() {
            setProgress(40, '初始化模块...');

            // 第二步：业务模块并行加载（模块间无依赖关系）
            return Promise.all([
              loadJS('js/config.js'),
              loadJS('js/sceneManager.js'),
              loadJS('js/firstPersonController.js'),
              loadJS('js/buildingModels.js'),
              loadJS('js/particleEffects.js'),
              loadJS('js/doorInteraction.js'),
              loadJS('js/sceneLoader.js'),
              loadJS('js/zoneScenes.js'),
              loadJS('js/plaza.js'),
              loadJS('js/zonePanels.js'),
              loadJS('js/app.js')
            ]).then(() => {
              // 加载2D界面交互模块（需求文档§5.2.5）
              return loadJS('js/zoneInteraction.js');
            });
          }).then(function() {
            setProgress(90, '启动中...');
          }).catch(function(err) {
            console.error('[Loader] 加载失败:', err);
            // Three.js加载失败，显示2D后备界面
            load2DFallback();
          });
        });
      });

      // 兜底超时
      setTimeout(hideLoading, 8000);

      // 2D后备界面三层导航（WebGL fallback）
      window._fbShowZone = function(zoneId) {
        const mainDiv = document.getElementById('fallback-main');
        const pageDiv = document.getElementById('fallback-zone-page');
        if (!mainDiv || !pageDiv) return;
        mainDiv.style.display = 'none';
        const zoneData = {
          adult: { name: '🌆 成人区 · 商业中心', color: '#4361ee', bg: '#1a1a2e', modules: [
            { icon: '🤖', name: 'AI Agent 市场', desc: '专业AI助手', type: 'agent' },
            { icon: '🔧', name: 'Skill 交易市场', desc: '技能工具交易', type: 'skill' },
            { icon: '💰', name: 'Token 购买', desc: '灵活计费', type: 'token' },
            { icon: '📦', name: '个人仓库', desc: '类GitHub管理', type: 'repo' },
            { icon: '📊', name: '数据分析', desc: '智能分析报告', type: 'analytics' },
            { icon: '💵', name: '收入结算', desc: '查看收入提现', type: 'settlement' },
          ]},
          teen: { name: '🎒 青少年区 · 学习中心', color: '#2196F3', bg: '#E3F2FD', modules: [
            { icon: '💻', name: '编程教育 Agent', desc: 'Python/JavaScript入门', type: 'course' },
            { icon: '📐', name: '学科辅导 Agent', desc: '数学/物理/化学/英语', type: 'course' },
            { icon: '🎨', name: '兴趣培养 Agent', desc: '音乐/绘画/摄影', type: 'course' },
            { icon: '📈', name: '学习进度跟踪', desc: '可视化报告', type: 'progress' },
            { icon: '👨👩👧', name: '家长监控面板', desc: '使用时间、内容过滤', type: 'parent' },
          ]},
          children: { name: '🧸 儿童区 · 游乐中心', color: '#FF4081', bg: '#FFF9C4', modules: [
            { icon: '📖', name: '互动故事', desc: 'AI语音讲故事', type: 'story' },
            { icon: '🧩', name: '益智游戏', desc: '数学游戏、拼图', type: 'game' },
            { icon: '🚦', name: '安全教育', desc: '交通/消防/网络安全', type: 'safety' },
            { icon: '👨👩👧', name: '家长监控', desc: '内容过滤', type: 'parent' },
          ]},
          elderly: { name: '🏯 老年区 · 养生中心', color: '#8D6E63', bg: '#FFF3E0', modules: [
            { icon: '🎤', name: '语音助手', desc: '语音输入输出', type: 'voice' },
            { icon: '❤️', name: '健康监测', desc: '血压、血糖记录', type: 'health' },
            { icon: '🆘', name: '紧急呼叫', desc: '一键呼叫', type: 'emergency' },
            { icon: '🤝', name: '社区互助', desc: '志愿服务', type: 'community' },
            { icon: '🌿', name: '养生知识', desc: '健康生活指南', type: 'health' },
          ]},
          accessible: { name: '♿ 残障友好区 · 无障碍中心', color: '#FF6347', bg: '#fff', modules: [
            { icon: '🔊', name: '屏幕阅读器', desc: 'ARIA标签、语音朗读', type: 'screenreader' },
            { icon: '⌨️', name: '键盘导航', desc: 'Tab/Enter支持', type: 'keyboard' },
            { icon: '🎙️', name: '语音控制', desc: '语音命令替代点击', type: 'voice' },
            { icon: '🎨', name: '个性化设置', desc: '颜色、字体、语速', type: 'settings' },
            { icon: '👁️', name: '高对比度', desc: 'WCAG 2.1 AA', type: 'contrast' },
          ]},
        };
        const data = zoneData[zoneId];
        if (!data) return;
        pageDiv.innerHTML = `
          <div style="padding:20px;min-height:100vh;background:${data.bg}">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:${data.color};border-radius:12px 12px 0 0">
              <div style="font-size:26px;font-weight:600;color:#fff">${data.name}</div>
              <button onclick="window._fbBack()" style="padding:10px 20px;border:none;border-radius:8px;background:rgba(255,255,255,0.3);color:#fff;font-size:16px;cursor:pointer">← 返回</button>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:20px">
              ${data.modules.map(m => `
                <div onclick="window._fbShowList('${zoneId}','${m.type}')" style="border-radius:12px;padding:20px;background:#fff;border:2px solid ${data.color};transition:transform 0.2s,box-shadow 0.2s;cursor:pointer"
                     onmouseenter="this.style.transform='translateY(-3px)';this.style.boxShadow='0 12px 30px rgba(0,0,0,0.15)'"
                     onmouseleave="this.style.transform='none';this.style.boxShadow='none'">
                  <div style="font-size:40px;margin-bottom:10px">${m.icon}</div>
                  <div style="font-size:18px;font-weight:600;margin-bottom:8px;color:${data.color}">${m.name}</div>
                  <div style="font-size:14px;color:#666">${m.desc}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
        pageDiv.style.display = 'block';
      };

      window._fbShowList = function(zoneId, moduleType) {
        const pageDiv = document.getElementById('fallback-zone-page');
        if (!pageDiv) return;
        const zoneData = {
          adult: { color: '#4361ee', bg: '#1a1a2e', items: moduleType === 'agent' ? [
            { name: '编程助手', desc: 'Python/JavaScript代码生成与调试', price: 10, icon: '💻' },
            { name: '设计大师', desc: 'UI/UX设计建议与素材生成', price: 15, icon: '🎨' },
            { name: '数据分析师', desc: 'Excel/CSV数据可视化分析', price: 20, icon: '📊' },
            { name: '文案策划', desc: '营销文案、广告语生成', price: 8, icon: '✍️' },
          ] : [
            { name: '高级爬虫工具', desc: '支持反爬对抗，自动代理轮换', price: 50, icon: '🕷️' },
            { name: 'PDF转换器', desc: 'Word/Excel/图片转PDF，无水印', price: 20, icon: '📄' },
            { name: 'API调试器', desc: 'REST/GraphQL请求模拟，参数校验', price: 30, icon: '🔌' },
          ]},
          teen: { color: '#2196F3', bg: '#E3F2FD', items: [
            { name: 'Python入门', desc: '零基础Python编程入门，闯关式学习', price: 0, icon: '🐍' },
            { name: 'JavaScript小游戏', desc: '用JS制作贪吃蛇、俄罗斯方块', price: 0, icon: '🎮' },
            { name: 'Scratch创意编程', desc: '拖拽式编程，培养逻辑思维', price: 0, icon: '🧩' },
            { name: 'HTML/CSS网页制作', desc: '从零开始做自己的网站', price: 0, icon: '🌐' },
          ]},
          children: { color: '#FF4081', bg: '#FFF9C4', items: moduleType === 'story' ? [
            { name: '小红帽', desc: '经典格林童话，AI互动结局', icon: '🌲' },
            { name: '三只小猪', desc: '建造不同的房子，结果会怎样？', icon: '🏠' },
          ] : [
            { name: '数学大冒险', desc: '加减乘除闯关，锻炼计算能力', icon: '🔢' },
            { name: '记忆翻翻乐', desc: '翻牌配对，训练记忆力', icon: '🧠' },
          ]},
          elderly: { color: '#8D6E63', bg: '#FFF3E0', items: [
            { name: '春季养生指南', desc: '多吃蔬菜水果，少吃辛辣油腻，适当运动', icon: '🌿' },
            { name: '高血压自我管理', desc: '限制盐分摄入，每天不超过6克', icon: '🩸' },
            { name: '糖尿病饮食调理', desc: '控制碳水化合物摄入，少食多餐', icon: '💉' },
            { name: '睡眠健康指南', desc: '保持规律作息，每晚7-8小时睡眠', icon: '😴' },
          ]},
          accessible: { color: '#FF6347', bg: '#fff', items: [
            { name: '高对比度模式', desc: '增强文字与背景对比度', icon: '👁️' },
            { name: '大字体显示', desc: '字体放大至24px-36px可调', icon: '🔤' },
            { name: '语音朗读', desc: '自动朗读页面内容', icon: '🔊' },
            { name: '键盘导航', desc: '支持Tab/Enter等键盘操作', icon: '⌨️' },
          ]},
        };
        const data = zoneData[zoneId];
        if (!data) return;
        pageDiv.innerHTML = `
          <div style="padding:20px;min-height:100vh;background:${data.bg}">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:15px 20px;background:${data.color};border-radius:12px 12px 0 0">
              <div style="font-size:22px;font-weight:600;color:#fff">列表</div>
              <button onclick="window._fbShowZone('${zoneId}')" style="padding:10px 20px;border:none;border-radius:8px;background:rgba(255,255,255,0.3);color:#fff;font-size:16px;cursor:pointer">← 返回</button>
            </div>
            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:20px">
              ${data.items.map(item => `
                <div style="border-radius:12px;padding:20px;background:#fff;border:2px solid ${data.color};cursor:pointer"
                     onclick="alert('正在启动 ${item.name}...')">
                  <div style="font-size:40px;margin-bottom:10px">${item.icon}</div>
                  <div style="font-size:18px;font-weight:600;margin-bottom:8px;color:${data.color}">${item.name}</div>
                  <div style="font-size:14px;color:#666;margin-bottom:10px">${item.desc}</div>
                  ${item.price !== undefined ? `<div style="color:#f72585;font-weight:600">💰 ${item.price} Token${item.price === 0 ? '（免费）' : '/次'}</div>` : ''}
                </div>
              `).join('')}
            </div>
          </div>
        `;
      };


      window._fbBack = function() {
        const mainDiv = document.getElementById('fallback-main');
        const pageDiv = document.getElementById('fallback-zone-page');
        if (mainDiv) mainDiv.style.display = 'block';
        if (pageDiv) pageDiv.style.display = 'none';
      };
    });
  })();
  </script>
</body>
</html>

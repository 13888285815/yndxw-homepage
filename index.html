<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
    <meta name="theme-color" content="#87CEEB">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>YNDXW - 全球内容互联平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Loading -->
    <div id="loading">
        <h2>YNDXW</h2>
        <div class="bar"><div class="bar-inner" id="loadBar"></div></div>
    </div>

    <!-- 3D场景 -->
    <canvas id="scene"></canvas>

    <!-- UI覆盖层 -->
    <div id="ui">
        <header>
            <div class="logo">☁️ YNDXW</div>
            <nav>
                <button class="ui-btn primary" id="btn-enter">开始探索</button>
                <button class="ui-btn ghost" id="btn-login">登录</button>
            </nav>
        </header>
        <div class="hint">👁️ 第一人称视角 · 拖拽转头 · 点击建筑进入</div>
    </div>

    <!-- 登录弹窗 -->
    <div id="login-modal">
        <div class="login-box">
            <h2>登录 YNDXW</h2>
            <p>进入你的未来世界</p>
            <input class="login-input" type="text" placeholder="用户名 / 邮箱">
            <input class="login-input" type="password" placeholder="密码">
            <button class="login-btn">登 录</button>
        </div>
    </div>

    <!-- 脚本：先加载Three.js，再加载config.js，最后加载app.js -->
    <script src="js/lib/three.min.js"></script>
    <script src="js/config.js"></script>
    <script>
        // 加载进度动画
        let progress=0;
        const bar=document.getElementById('loadBar');
        const loading=document.getElementById('loading');
        const timer=setInterval(()=>{
            progress+=Math.random()*15;
            if(progress>=100){
                progress=100;
                clearInterval(timer);
                setTimeout(()=>loading.classList.add('hide'),400);
            }
            bar.style.width=progress+'%';
        },80);
        
        // 按钮事件
        document.getElementById('btn-enter').addEventListener('click', ()=>{
            document.querySelector('.hint').style.opacity='1';
        });
        document.getElementById('btn-login').addEventListener('click', ()=>{
            document.getElementById('login-modal').classList.toggle('show');
        });
        document.getElementById('login-modal').addEventListener('click', e=>{
            if(e.target===e.currentTarget) e.target.classList.remove('show');
        });
    </script>
    <script src="js/app.js"></script>
</body>
</html>
